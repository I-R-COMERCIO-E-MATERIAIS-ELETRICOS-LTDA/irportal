<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportadoras</title>
    <link rel="icon" type="image/png" href="I.R.-COMERCIO-E-MATERIAIS-ELETRICOS-PRETO.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- App Content -->
    <div class="app-content">
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <h1>Transportadoras</h1>
                    <div id="connectionStatus" class="connection-status offline">
                        <span class="status-dot"></span>
                    </div>
                </div>
                <button onclick="openFormModal()" class="btn-new-order-header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Nova Transportadora
                </button>
            </div>

            <!-- Search Bar -->
            <div class="search-bar-wrapper">
                <div class="search-bar">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                    <input type="text" id="search" placeholder="Buscar por nome, representante, e-mail, região ou estado..." oninput="filterTransportadoras()">
                </div>
            </div>

            <!-- Table Card -->
            <div class="card table-card">
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Representante</th>
                                <th>Telefone</th>
                                <th>Celular</th>
                                <th>E-mail</th>
                                <th style="text-align: center;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="transportadorasContainer"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE FORMULÁRIO -->
    <div class="modal-overlay" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="formTitle">Nova Transportadora</h3>
                <button class="close-modal" onclick="closeFormModal()">✕</button>
            </div>

            <div class="form-grid" style="padding: 1.5rem;">
                <div class="form-group form-group-full">
                    <label>Nome *</label>
                    <input type="text" id="nome" placeholder="NOME DA TRANSPORTADORA">
                </div>
                <div class="form-group">
                    <label>Representante</label>
                    <input type="text" id="representante" placeholder="Nome do representante">
                </div>
                <div class="form-group">
                    <label>E-mail *</label>
                    <input type="email" id="email" placeholder="email@transportadora.com">
                </div>
                <div class="form-group">
                    <label>Telefones <small style="color:var(--text-secondary)">(separe por vírgula)</small></label>
                    <input type="text" id="telefones" placeholder="(00) 0000-0000, (00) 0000-0000">
                </div>
                <div class="form-group">
                    <label>Celulares <small style="color:var(--text-secondary)">(separe por vírgula)</small></label>
                    <input type="text" id="celulares" placeholder="(00) 00000-0000">
                </div>
                <div class="form-group">
                    <label>Regiões <small style="color:var(--text-secondary)">(separe por vírgula)</small></label>
                    <input type="text" id="regioes" placeholder="Sudeste, Sul, Centro-Oeste">
                </div>
                <div class="form-group">
                    <label>Estados <small style="color:var(--text-secondary)">(separe por vírgula)</small></label>
                    <input type="text" id="estados" placeholder="ES, RJ, SP, MG">
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" onclick="saveTransportadora()">Salvar</button>
                <button type="button" onclick="closeFormModal()" class="cancel-close">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
