<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/portal/IR ICONE.png">
    <title>Painel — I.R. Comércio</title>
    <link rel="stylesheet" href="/painel/styles.css">
</head>
<body>

<!-- ─── LOADING ──────────────────────────────────────────────────────────── -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Carregando painel...</div>
</div>

<!-- ─── HEADER ───────────────────────────────────────────────────────────── -->
<header class="painel-header">
    <a class="header-logo" href="/painel">
        <img src="/portal/IR ICONE.png" alt="IR" onerror="this.style.display='none'">
        <span class="header-logo-text">I.R. Comércio</span>
    </a>
    <div class="header-sep"></div>
    <div class="header-title">Painel</div>
    <div class="header-user">
        Olá, <span class="header-user-name" id="userName">—</span>
        <a class="btn-back" href="/portal">
            ← Módulos
        </a>
    </div>
</header>

<!-- ─── ANO SELECTOR ─────────────────────────────────────────────────────── -->
<div class="year-bar">
    <label for="anoSel">Ano de referência:</label>
    <select id="anoSel"></select>
</div>

<!-- ─── BODY ─────────────────────────────────────────────────────────────── -->
<div class="painel-body" id="painelBody">
    <!-- renderizado dinamicamente via script.js -->
</div>

<script src="/painel/script.js"></script>
</body>
</html>
