<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Badges de status ───────────────────────────── */
        .badge.st-pago {
            background: rgba(34,197,94,0.20);
            color: #15803d;
            border: 1px solid rgba(34,197,94,0.45);
            font-weight: 700;
        }
        .badge.st-parcela {
            background: rgba(34,197,94,0.15);
            color: #16a34a;
            border: 1px solid rgba(34,197,94,0.35);
            font-weight: 700;
        }
        .badge.st-entregue {
            background: rgba(59,130,246,0.20);
            color: #1d4ed8;
            border: 1px solid rgba(59,130,246,0.45);
            font-weight: 700;
        }
        .badge.st-transito {
            background: rgba(249,115,22,0.18);
            color: #c2410c;
            border: 1px solid rgba(249,115,22,0.40);
            font-weight: 700;
        }
        .badge.st-remessa {
            background: rgba(107,114,128,0.15);
            color: #374151;
            border: 1px solid rgba(107,114,128,0.35);
            font-weight: 700;
        }

        /* ── Select desabilitado ─────────────────────────── */
        select:disabled {
            opacity: 0.7 !important;
            cursor: not-allowed !important;
            background: var(--input-bg) !important;
        }

        /* ── Animações ───────────────────────────────────── */
        @keyframes spin        { to { transform: rotate(360deg); } }
        @keyframes slideInBottom  { from { opacity:0; transform:translateY(60px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideOutBottom { to   { opacity:0; transform:translateY(60px); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <!-- SPLASH -->
    <div class="splash-screen" id="splashScreen"><div class="loader"></div></div>

    <!-- APP -->
    <div class="app-content" id="mainView">
        <div class="container">

            <!-- CABEÇALHO -->
            <div class="header">
                <div class="header-left">
                    <h1>Vendas</h1>
                    <div id="connectionStatus" class="connection-status offline">
                        <span class="status-dot"></span>
                    </div>
                </div>
            </div>

            <!-- DASHBOARD -->
            <div class="dashboard-grid">

                <div class="stat-card stat-card-success">
                    <div class="stat-icon stat-icon-success">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value stat-value-success" id="totalPago">R$ 0,00</div>
                        <div class="stat-label">Pago</div>
                    </div>
                </div>

                <div class="stat-card stat-card-warning">
                    <div class="stat-icon stat-icon-warning">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value stat-value-warning" id="totalAReceber">R$ 0,00</div>
                        <div class="stat-label">A Receber</div>
                    </div>
                </div>

                <div class="stat-card stat-card-info">
                    <div class="stat-icon stat-icon-info">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="8.5" cy="7" r="4"></circle>
                            <polyline points="17 11 19 13 23 9"></polyline>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value stat-value-info" id="totalEntregue">0</div>
                        <div class="stat-label">Entregue</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon stat-icon-default">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalFaturado">R$ 0,00</div>
                        <div class="stat-label">Faturado</div>
                    </div>
                </div>

            </div>

            <!-- BARRA DE PESQUISA + FILTROS -->
            <div class="search-bar-wrapper">
                <div class="search-bar">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>

                    <input type="text" id="search" placeholder="Pesquisar NF, órgão, vendedor..." oninput="filterVendas()">

                    <div class="search-bar-filters">

                        <!-- Vendedor (desabilitado para perfis não-admin via JS) -->
                        <div class="filter-dropdown-inline">
                            <select id="filterVendedor" onchange="filterVendas()">
                                <option value="">Todos</option>
                                <option value="ROBERTO">Roberto</option>
                                <option value="ISAQUE">Isaque</option>
                                <option value="MIGUEL">Miguel</option>
                                <option value="ROSEMEIRE">Rosemeire</option>
                            </select>
                            <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>

                        <!-- Status -->
                        <div class="filter-dropdown-inline">
                            <select id="filterStatus" onchange="filterVendas()">
                                <option value="">Todos os Status</option>
                                <option value="PAGO">Pago</option>
                                <option value="PARCELA">Parcelado</option>
                                <option value="ENTREGUE">Entregue</option>
                                <option value="EM TRÂNSITO">Em Trânsito</option>
                                <option value="SIMPLES REMESSA">Simples Remessa</option>
                                <option value="REMESSA DE AMOSTRA">Remessa de Amostra</option>
                            </select>
                            <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>

                        <!-- Navegação de mês -->
                        <div class="month-navigation-inline">
                            <button onclick="changeMonth(-1)" class="month-nav-arrow" title="Mês anterior">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 18 9 12 15 6"></polyline>
                                </svg>
                            </button>
                            <div class="month-display-inline"><span id="currentMonth">Carregando...</span></div>
                            <button onclick="changeMonth(1)" class="month-nav-arrow" title="Próximo mês">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 18 15 12 9 6"></polyline>
                                </svg>
                            </button>
                        </div>

                    </div>

                    <!-- Calendário -->
                    <button class="calendar-btn" onclick="toggleCalendar()" title="Selecionar mês">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </button>

                    <!-- PDF / Comissão -->
                    <button class="calendar-btn" onclick="gerarPDF()" title="Relatório de Comissão">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                    </button>

                    <!-- Sincronizar -->
                    <button class="calendar-btn" onclick="syncData()" title="Sincronizar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>

                </div>
            </div>

            <!-- MODAL CALENDÁRIO -->
            <div class="calendar-modal" id="calendarModal">
                <div class="calendar-content">
                    <div class="calendar-header">
                        <button onclick="changeCalendarYear(-1)" class="calendar-year-nav">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                        <h3 id="calendarYear">2026</h3>
                        <button onclick="changeCalendarYear(1)" class="calendar-year-nav">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                        </button>
                    </div>
                    <div class="calendar-months" id="calendarMonths"></div>
                </div>
            </div>

            <!-- TABELA -->
            <div class="card table-card">
                <div id="vendasContainer">
                    <div style="text-align:center;padding:2.5rem;color:var(--text-secondary);">
                        Carregando dados...
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL DETALHES -->
    <div class="modal-overlay" id="infoModal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">NF Nº <span id="modalNumeroNF"></span></h3>
                <button class="close-modal" onclick="closeInfoModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-actions">
                <button type="button" onclick="closeInfoModal()" class="secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script>setTimeout(() => { const s=document.getElementById('splashScreen'); if(s) s.style.display='none'; }, 2500);</script>
    <script src="script.js"></script>
</body>
</html>
